name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Resolve release version
      id: get_version
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"

    - name: Verify Docker image tag does not already exist
      run: |
        IMAGE="ghcr.io/bitjourney/plantuml-service:${{ steps.get_version.outputs.version }}"
        if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
          echo "::error::Image $IMAGE already exists in ghcr.io. Aborting to prevent overwrite."
          exit 1
        fi

    - name: Set up Java
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Docker image for building
      run: docker build -f DockerfileForBuild -t plantuml-service-builder .

    - name: Run build
      run: docker run --rm -v $(pwd):/app -e GRADLE_USER_HOME=/app/.gradle -e RELEASE_VERSION=${{ steps.get_version.outputs.version }} plantuml-service-builder ./gradlew stage

    - name: Check build artifacts
      run: |
        if [ ! -f "./bin/plantuml-service.jar" ]; then
          echo "Build failed: JAR file not found"
          exit 1
        fi
        echo "Build successful: JAR file created"

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${GITHUB_REF_NAME}" \
          --title "${GITHUB_REF_NAME}" \
          --generate-notes \
          ./bin/plantuml-service.jar

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Build and push Docker image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: .
        push: true
        platforms: linux/amd64, linux/arm64
        tags: ghcr.io/bitjourney/plantuml-service:${{ steps.get_version.outputs.version }}
        build-args: |
          PLANTUML_SERVICE_VERSION=${{ steps.get_version.outputs.version }}
